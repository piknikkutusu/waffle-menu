<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piknik Kutusu - Siparişlerim</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #FAF6F0; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-10 min-h-screen">

    <header class="flex items-center justify-between my-4">
        <button onclick="window.location.href='index.html'" class="bg-white w-10 h-10 rounded-full flex items-center justify-center shadow-sm border border-stone-100 font-bold text-stone-700">←</button>
        <h1 class="text-xl font-bold text-[#3C2A21]">📋 Siparişlerim</h1>
        <div class="w-10"></div>
    </header>

    <div id="loading" class="text-center py-12 text-stone-400 font-medium">🔄 Siparişleriniz yükleniyor...</div>
    <div id="empty-state" class="hidden text-center py-16 text-stone-400">
        <p class="text-4xl mb-3">🧺</p>
        <p class="font-medium">Henüz bir siparişiniz yok.</p>
    </div>

    <div id="orders-list" class="space-y-4"></div>

    <script>
        const SIPARIS_URL = 'https://waffle-menu-cff76-default-rtdb.firebaseio.com/siparisler.json';

        function getClientId() {
            return localStorage.getItem('clientId');
        }

        function fetchMyOrders() {
            fetch(SIPARIS_URL)
                .then(res => res.json())
                .then(data => renderMyOrders(data))
                .catch(err => console.error(err))
                .finally(() => setTimeout(fetchMyOrders, 4000));
        }

        function renderMyOrders(ordersObj) {
            const myId = getClientId();
            const container = document.getElementById('orders-list');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty-state');

            loading.classList.add('hidden');

            if (!ordersObj) {
                container.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            const myOrders = Object.values(ordersObj)
                .filter(o => o.clientId === myId)
                .sort((a, b) => b.id - a.id);

            if (myOrders.length === 0) {
                container.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            container.innerHTML = '';

            myOrders.forEach(s => {
                const malzemeler = (s.malzemeler || []).map(m =>
                    `<span class="inline-block bg-[#EAE3D2] text-[#3C2A21] text-xs px-2.5 py-1 rounded-md font-medium">${m}</span>`
                ).join(' ');

                const icecekler = (s.icecekler || []).map(i =>
                    `<div class="text-sm font-bold text-stone-700">🥤 ${i}</div>`
                ).join('');

                container.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-stone-100">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-sm font-bold text-[#3C2A21]">${s.tur || 'Sipariş'}</span>
                            <span class="text-xs text-stone-400 font-mono">${s.zaman}</span>
                        </div>
                        ${malzemeler ? `<div class="flex flex-wrap gap-1.5 mb-3">${malzemeler}</div>` : ''}
                        ${icecekler ? `<div class="mb-3">${icecekler}</div>` : ''}
                        ${s.not ? `<div class="bg-[#FAF6F0] p-2.5 rounded-xl text-xs text-stone-600 italic mb-3">"${s.not}"</div>` : ''}
                        <div class="border-t border-stone-100 pt-3 flex justify-between items-center">
                            <span class="text-xs text-stone-400 font-bold">Toplam</span>
                            <span class="text-lg font-black text-[#3C2A21]">${s.toplam} TL</span>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = fetchMyOrders;
    </script>
</body>
</html>
