<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piknik Kutusu - Mutfak Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #1C1410; }
        .order-card { animation: popIn 0.3s ease; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .tab-active { background-color: #EAE3D2; color: #1C1410; }
    </style>
</head>
<body class="min-h-screen text-stone-100 p-6">

    <header class="flex justify-between items-center border-b border-stone-800 pb-5 mb-6">
        <div>
            <h1 class="text-2xl font-black text-[#EAE3D2] tracking-wide">🧺 PİKNİK KUTUSU MUTFAK</h1>
            <p class="text-sm text-stone-500 mt-1">Siparişler ve masa talepleri anlık olarak burada.</p>
        </div>
        <div class="flex items-center gap-3">
            <button id="notif-permission-btn" class="bg-[#EAE3D2] text-[#1C1410] text-xs font-bold px-4 py-2.5 rounded-xl cursor-pointer">🔔 Bildirimleri Aç</button>
            <div class="bg-stone-800 px-4 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2">
                <span class="animate-ping inline-block h-2 w-2 rounded-full bg-emerald-400"></span>
                <span>Canlı</span>
            </div>
        </div>
    </header>

    <div class="flex gap-2 mb-6">
        <button onclick="switchTab('orders')" id="tab-orders" class="tab-active px-5 py-2.5 rounded-xl text-sm font-bold cursor-pointer">
            📋 Siparişler <span id="order-count" class="ml-1"></span>
        </button>
        <button onclick="switchTab('calls')" id="tab-calls" class="bg-stone-800 text-stone-300 px-5 py-2.5 rounded-xl text-sm font-bold cursor-pointer">
            🔔 Masa Talepleri <span id="call-count" class="ml-1"></span>
        </button>
    </div>

    <div id="orders-panel" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    <div id="calls-panel" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav" preload="auto"></audio>
    <audio id="call-sound" src="https://assets.mixkit.co/active_storage/sfx/1000/1000-preview.mp3" preload="auto"></audio>

    <script>
        const SIPARIS_URL = 'https://waffle-menu-cff76-default-rtdb.firebaseio.com/siparisler.json';
        const CAGRI_URL = 'https://waffle-menu-cff76-default-rtdb.firebaseio.com/cagrilar.json';

        let knownOrderIds = new Set();
        let knownCallIds = new Set();
        let isFirstLoad = true;
        let isFirstCallLoad = true;

        document.getElementById('notif-permission-btn').addEventListener('click', () => {
            if (!("Notification" in window)) {
                alert("Bu tarayıcı masaüstü bildirimlerini desteklemiyor.");
                return;
            }
            Notification.requestPermission().then(perm => {
                if (perm === "granted") {
                    new Notification("Piknik Kutusu Mutfak", { body: "Bildirimler başarıyla açıldı ✅" });
                }
            });
        });

        function showDesktopNotification(title, body) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, { body: body });
            }
        }

        function switchTab(tab) {
            document.getElementById('orders-panel').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('calls-panel').classList.toggle('hidden', tab !== 'calls');
            document.getElementById('tab-orders').className = tab === 'orders'
                ? 'tab-active px-5 py-2.5 rounded-xl text-sm font-bold cursor-pointer'
                : 'bg-stone-800 text-stone-300 px-5 py-2.5 rounded-xl text-sm font-bold cursor-pointer';
            document.getElementById('tab-calls').className = tab === 'calls'
                ? 'tab-active px-5 py-2.5 rounded-xl text-sm font-bold cursor-pointer'
                : 'bg-stone-800 text-stone-300 px-5 py-2.5 rounded-xl text-sm font-bold cursor-pointer';
        }

        function fetchOrders() {
            fetch(SIPARIS_URL)
                .then(res => res.json())
                .then(data => renderOrders(data))
                .catch(err => console.error("Sipariş çekme hatası:", err))
                .finally(() => setTimeout(fetchOrders, 3000));
        }

        function renderOrders(ordersObj) {
            const container = document.getElementById('orders-panel');
            container.innerHTML = '';

            if (!ordersObj || Object.keys(ordersObj).length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-16 text-stone-500">📭 Bekleyen sipariş yok.</div>`;
                document.getElementById('order-count').innerText = '';
                isFirstLoad = false;
                return;
            }

            let newDetected = false;
            const keys = Object.keys(ordersObj);
            document.getElementById('order-count').innerText = `(${keys.length})`;

            keys.forEach(key => {
                const s = ordersObj[key];
                if (!knownOrderIds.has(key)) {
                    knownOrderIds.add(key);
                    if (!isFirstLoad) {
                        newDetected = true;
                        showDesktopNotification(`🧇 Yeni Sipariş - Masa ${s.masa}`, `${s.isim || ''} - ${s.tur} - ${s.toplam} TL`);
                    }
                }

                const malzemeler = (s.malzemeler || []).map(m =>
                    `<span class="inline-block bg-amber-950/40 text-amber-300 text-xs px-2.5 py-1 rounded-md font-medium border border-amber-900/40">${m}</span>`
                ).join(' ');

                const icecekler = (s.icecekler || []).map(i =>
                    `<div class="text-sm font-bold text-emerald-400">🥤 ${i}</div>`
                ).join('');

                container.innerHTML += `
                    <div class="order-card bg-stone-900 border-2 border-stone-800 rounded-2xl p-5 shadow-xl flex flex-col justify-between hover:border-amber-700/40 transition">
                        <div>
                            <div class="flex justify-between items-center border-b border-stone-800 pb-3 mb-3">
                                <div>
                                    <span class="bg-amber-800 text-white font-black px-4 py-1 rounded-xl text-lg">MASA ${s.masa}</span>
                                    ${s.isim ? `<span class="text-amber-200 text-sm font-semibold ml-2">👤 ${s.isim}</span>` : ''}
                                </div>
                                <span class="text-xs text-stone-500 font-mono">${s.zaman}</span>
                            </div>
                            <p class="text-xs font-bold text-stone-400 uppercase mb-2">${s.tur || 'Sipariş'}</p>
                            ${malzemeler ? `<div class="flex flex-wrap gap-1.5 mb-3">${malzemeler}</div>` : ''}
                            ${icecekler ? `<div class="mb-3">${icecekler}</div>` : ''}
                            ${s.not ? `<div class="bg-stone-950/60 border-l-4 border-amber-500 p-2.5 rounded-r-xl text-xs text-amber-300 italic mb-3">"${s.not}"</div>` : ''}
                        </div>
                        <div class="border-t border-stone-800 pt-3 mt-2 flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-stone-500 uppercase font-bold">Tutar</p>
                                <p class="text-lg font-black text-white">${s.toplam} TL</p>
                            </div>
                            <button onclick="completeOrder('${key}')" class="bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-bold px-4 py-2 rounded-xl transition cursor-pointer">
                                ✔️ Hazır / Teslim
                            </button>
                        </div>
                    </div>
                `;
            });

            if (newDetected) {
                document.getElementById('notif-sound').play().catch(() => {});
            }
            isFirstLoad = false;
        }

        function completeOrder(id) {
            fetch(`https://waffle-menu-cff76-default-rtdb.firebaseio.com/siparisler/${id}.json`, { method: 'DELETE' })
                .then(res => { if (res.ok) knownOrderIds.delete(id); });
        }

        function fetchCalls() {
            fetch(CAGRI_URL)
                .then(res => res.json())
                .then(data => renderCalls(data))
                .catch(err => console.error("Çağrı çekme hatası:", err))
                .finally(() => setTimeout(fetchCalls, 3000));
        }

        function renderCalls(callsObj) {
            const container = document.getElementById('calls-panel');
            container.innerHTML = '';

            if (!callsObj || Object.keys(callsObj).length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-16 text-stone-500">📭 Bekleyen talep yok.</div>`;
                document.getElementById('call-count').innerText = '';
                isFirstCallLoad = false;
                return;
            }

            let newDetected = false;
            const keys = Object.keys(callsObj);
            document.getElementById('call-count').innerText = `(${keys.length})`;

            keys.forEach(key => {
                const c = callsObj[key];
                if (!knownCallIds.has(key)) {
                    knownCallIds.add(key);
                    if (!isFirstCallLoad) {
                        newDetected = true;
                        showDesktopNotification(`🔔 Masa ${c.masa} - ${c.talep}`, `${c.isim || ''} - Saat: ${c.zaman}`);
                    }
                }

                const isBill = c.talep === 'Hesap İstiyor';

                container.innerHTML += `
                    <div class="order-card bg-stone-900 border-2 ${isBill ? 'border-blue-800/50' : 'border-amber-800/50'} rounded-2xl p-5 shadow-xl flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center mb-3">
                                <div>
                                    <span class="${isBill ? 'bg-blue-700' : 'bg-amber-700'} text-white font-black px-4 py-1 rounded-xl text-lg">MASA ${c.masa}</span>
                                    ${c.isim ? `<span class="text-stone-300 text-sm font-semibold ml-2">👤 ${c.isim}</span>` : ''}
                                </div>
                                <span class="text-xs text-stone-500 font-mono">${c.zaman}</span>
                            </div>
                            <p class="text-lg font-bold text-white">${isBill ? '💳' : '🔔'} ${c.talep}</p>
                        </div>
                        <button onclick="completeCall('${key}')" class="mt-4 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-bold px-4 py-2 rounded-xl transition cursor-pointer">
                            ✔️ Talep Karşılandı
                        </button>
                    </div>
                `;
            });

            if (newDetected) {
                document.getElementById('call-sound').play().catch(() => {});
            }
            isFirstCallLoad = false;
        }

        function completeCall(id) {
            fetch(`https://waffle-menu-cff76-default-rtdb.firebaseio.com/cagrilar/${id}.json`, { method: 'DELETE' })
                .then(res => { if (res.ok) knownCallIds.delete(id); });
        }

        window.onload = () => {
            fetchOrders();
            fetchCalls();
        };
    </script>
</body>
</html>
