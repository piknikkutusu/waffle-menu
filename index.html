<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piknik Kutusu - Dijital QR Menü</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #FAF6F0; }
        .premium-card { background-color: #3C2A21; color: #EAE3D2; }
        .modal-overlay { background-color: rgba(28, 20, 16, 0.6); }
    </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col justify-between pb-8">

    <header class="text-center my-6">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-[#3C2A21] rounded-3xl shadow-xl mb-4">
            <span class="text-4xl">🧺</span>
        </div>
        <h1 class="text-3xl font-bold text-[#3C2A21] tracking-wide">Piknik Kutusu</h1>
        <p class="text-stone-500 text-sm mt-1">Tatlı molaların en güzel adresi</p>
        <div class="mt-4 inline-block bg-[#EAE3D2] text-[#3C2A21] font-bold px-5 py-1.5 rounded-full text-xs shadow-sm border border-stone-300">
            Masa: <span id="tableNumber">-</span>
        </div>
    </header>

    <div id="table-select-container" class="bg-white p-5 rounded-3xl shadow-sm border border-stone-100 mb-6 text-center hidden">
        <h3 class="text-sm font-bold text-stone-700 mb-3">Lütfen Masa Numaranızı Seçin:</h3>
        <select id="masa-select" class="w-full bg-[#FAF6F0] border border-stone-200 p-3 rounded-2xl text-[#3C2A21] font-semibold focus:outline-none">
            <option value="">Seçiniz...</option>
            <option value="1">Masa 1</option>
            <option value="2">Masa 2</option>
            <option value="3">Masa 3</option>
            <option value="4">Masa 4</option>
            <option value="5">Masa 5</option>
        </select>
    </div>

    <main class="space-y-4 flex-grow my-4">
        
        <button onclick="navigateMenu('waffle')" class="w-full premium-card p-5 rounded-3xl shadow-lg flex items-center space-x-4 active:scale-95 transition cursor-pointer">
            <div class="bg-[#EAE3D2] w-14 h-14 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🧇</div>
            <div class="text-left">
                <h2 class="text-lg font-bold">Waffle Oluştur</h2>
                <p class="text-stone-400 text-xs mt-0.5">Kendi waffle'ını kendin tasarla.</p>
            </div>
        </button>

        <button onclick="navigateMenu('icecek')" class="w-full bg-white text-[#3C2A21] p-5 rounded-3xl shadow-sm border border-stone-100 flex items-center space-x-4 active:scale-95 transition cursor-pointer">
            <div class="bg-[#FAF6F0] w-14 h-14 rounded-2xl flex items-center justify-center text-3xl">🥤</div>
            <div class="text-left">
                <h2 class="text-lg font-bold">İçecekler</h2>
                <p class="text-stone-500 text-xs mt-0.5">Sıcak, soğuk ve özel lezzetler.</p>
            </div>
        </button>

        <button onclick="goToOrders()" class="w-full bg-white text-[#3C2A21] p-5 rounded-3xl shadow-sm border border-stone-100 flex items-center space-x-4 active:scale-95 transition cursor-pointer">
            <div class="bg-[#FAF6F0] w-14 h-14 rounded-2xl flex items-center justify-center text-3xl">📋</div>
            <div class="text-left">
                <h2 class="text-lg font-bold">Siparişlerim</h2>
                <p class="text-stone-500 text-xs mt-0.5">Verdiğin siparişleri gör.</p>
            </div>
        </button>

        <div class="grid grid-cols-2 gap-3 pt-2">
            <button onclick="askNameThen(callWaiter)" class="bg-white p-4 rounded-2xl border border-stone-100 shadow-sm flex flex-col items-center justify-center active:scale-95 transition cursor-pointer">
                <span class="text-2xl mb-1">🔔</span>
                <span class="text-xs font-bold text-stone-700">Garson Çağır</span>
            </button>
            <button onclick="askNameThen(requestBill)" class="bg-white p-4 rounded-2xl border border-stone-100 shadow-sm flex flex-col items-center justify-center active:scale-95 transition cursor-pointer">
                <span class="text-2xl mb-1">💳</span>
                <span class="text-xs font-bold text-stone-700">Hesap İste</span>
            </button>
        </div>

    </main>

    <footer class="text-center text-stone-400 text-xs pt-6">
        <p>© 2026 Piknik Kutusu</p>
    </footer>

    <!-- İsim Sorma Modalı -->
    <div id="name-modal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm">
            <h3 class="text-lg font-bold text-[#3C2A21] mb-1">İsminiz nedir?</h3>
            <p class="text-xs text-stone-500 mb-4">Size ismizle servis edebilmemiz için.</p>
            <input type="text" id="name-modal-input" placeholder="Adınız" class="w-full bg-[#FAF6F0] border border-stone-200 p-3 rounded-2xl text-[#3C2A21] font-semibold focus:outline-none mb-4">
            <div class="flex gap-2">
                <button onclick="closeNameModal()" class="flex-1 bg-stone-100 text-stone-600 font-bold py-3 rounded-2xl cursor-pointer">Vazgeç</button>
                <button onclick="confirmNameModal()" class="flex-1 bg-[#3C2A21] text-[#EAE3D2] font-bold py-3 rounded-2xl cursor-pointer">Onayla</button>
            </div>
        </div>
    </div>

    <script>
        function getClientId() {
            let id = localStorage.getItem('clientId');
            if (!id) {
                id = 'c_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('clientId', id);
            }
            return id;
        }
        getClientId();

        const urlParams = new URLSearchParams(window.location.search);
        let masaNo = urlParams.get('masa');

        if (masaNo) {
            localStorage.setItem('seciliMasa', masaNo);
            document.getElementById('tableNumber').innerText = masaNo;
            document.getElementById('table-select-container').classList.add('hidden');
        } else {
            const kayitliMasa = localStorage.getItem('seciliMasa');
            if (kayitliMasa) {
                document.getElementById('tableNumber').innerText = kayitliMasa;
                document.getElementById('table-select-container').classList.add('hidden');
            } else {
                document.getElementById('table-select-container').classList.remove('hidden');
            }
        }

        const masaSelectEl = document.getElementById('masa-select');
        if (masaSelectEl) {
            masaSelectEl.addEventListener('change', (e) => {
                const m = e.target.value;
                if (m) {
                    localStorage.setItem('seciliMasa', m);
                    document.getElementById('tableNumber').innerText = m;
                } else {
                    localStorage.removeItem('seciliMasa');
                    document.getElementById('tableNumber').innerText = '-';
                }
            });
        }

        function navigateMenu(type) {
            const m = localStorage.getItem('seciliMasa');
            if (!m) {
                alert("Lütfen önce masa numaranızı seçin!");
                return;
            }
            window.location.href = `menu.html?type=${type}&masa=${m}`;
        }

        function goToOrders() {
            window.location.href = 'orders.html';
        }

        // --- İsim Modalı ---
        let pendingAction = null;

        function askNameThen(action) {
            const m = localStorage.getItem('seciliMasa');
            if (!m) {
                alert("Lütfen önce masa numaranızı seçin!");
                return;
            }
            const kayitliAd = localStorage.getItem('musteriAdi');
            if (kayitliAd) {
                action();
                return;
            }
            pendingAction = action;
            document.getElementById('name-modal-input').value = '';
            document.getElementById('name-modal').classList.remove('hidden');
        }

        function closeNameModal() {
            document.getElementById('name-modal').classList.add('hidden');
            pendingAction = null;
        }

        function confirmNameModal() {
            const ad = document.getElementById('name-modal-input').value.trim();
            if (!ad) {
                alert("Lütfen isminizi yazın.");
                return;
            }
            localStorage.setItem('musteriAdi', ad);
            document.getElementById('name-modal').classList.add('hidden');
            if (pendingAction) pendingAction();
            pendingAction = null;
        }

        // --- Garson / Hesap ---
        const FIREBASE_URL = 'https://waffle-menu-cff76-default-rtdb.firebaseio.com/cagrilar.json';

        function callWaiter() {
            sendCall("Garson Çağırıyor");
        }

        function requestBill() {
            sendCall("Hesap İstiyor");
        }

        function sendCall(tip) {
            const m = localStorage.getItem('seciliMasa');
            const ad = localStorage.getItem('musteriAdi') || 'İsimsiz';
            fetch(FIREBASE_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    masa: m,
                    isim: ad,
                    talep: tip,
                    zaman: new Date().toLocaleTimeString('tr-TR'),
                    durum: 'Bekliyor'
                })
            }).then(r => {
                if (r.ok) alert("Talebiniz başarıyla mutfağa iletildi. 🧺");
            });
        }
    </script>
</body>
</html>
