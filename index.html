<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waffle Aşkına - Dijital Menü</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --primary: #FF6B81; --bg-soft: #FFF5F5; }
        body { background-color: var(--bg-soft); font-family: 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-32">

    <header class="text-center my-6">
        <h1 class="text-3xl font-black text-rose-500 tracking-wide">WAFFLE AŞKINA 🧇</h1>
        <p class="text-gray-500 text-sm mt-1">Kendi waffle'ını kendin tasarla!</p>
        <div class="mt-3 inline-block bg-rose-100 text-rose-600 font-bold px-4 py-1 rounded-full text-xs" id="table-display">Masa: Seçilmedi</div>
    </header>

    <div id="masa-container" class="bg-white p-4 rounded-2xl shadow-sm mb-6">
        <label class="block text-gray-700 font-bold text-sm mb-2">Lütfen Masa Numaranızı Doğrulayın:</label>
        <select id="masa-select" class="w-full border border-gray-200 p-3 rounded-xl focus:outline-none focus:border-rose-400">
            <option value="">Masa Seçiniz...</option>
            <option value="1">Masa 1</option> <option value="2">Masa 2</option> <option value="3">Masa 3</option> <option value="4">Masa 4</option> <option value="5">Masa 5</option>
        </select>
    </div>

    <div id="loading" class="text-center py-8 text-gray-400 font-medium">🔄 Menü listesi yükleniyor, lütfen bekleyin...</div>

    <form id="order-form" class="space-y-6 hidden">
        <!-- Waffle Malzemeleri -->
        <div id="waffle-section" class="space-y-4"></div>
        
        <!-- İçecekler -->
        <div class="bg-white p-4 rounded-2xl shadow-sm">
            <h2 class="text-lg font-bold text-gray-800 mb-3 border-b border-gray-100 pb-2">☕ Yanına İçecek?</h2>
            <div id="drinks-container" class="space-y-3"></div>
        </div>

        <!-- Sipariş Notu -->
        <div class="bg-white p-4 rounded-2xl shadow-sm">
            <h2 class="text-lg font-bold text-gray-800 mb-2">✍️ Sipariş Notu</h2>
            <textarea id="order-note" placeholder="Alerjiniz var mı? Veya özel bir isteğiniz..." class="w-full border border-gray-100 p-3 rounded-xl text-sm focus:outline-none focus:border-rose-400 h-20 resize-none"></textarea>
        </div>

        <!-- Fiyat ve Gönder -->
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white p-4 border-t border-gray-100 shadow-xl rounded-t-3xl flex justify-between items-center z-50">
            <div>
                <p class="text-xs text-gray-400 font-medium">Toplam Tutar</p>
                <p class="text-2xl font-black text-gray-800"><span id="total-price">0</span> TL</p>
            </div>
            <button type="submit" class="bg-rose-500 hover:bg-rose-600 text-white font-bold px-8 py-3 rounded-xl shadow-lg shadow-rose-200 cursor-pointer">Sipariş Ver</button>
        </div>
    </form>

    <script>
        // Apps Script köprü linkin buraya başarıyla entegre edildi:
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUmWm-XCZvNl4wp4VvSQnz3S0DuoOT1-369CPDZjmoySuL37lplVIqtXtjy5Z0pd9f/exec';
        const FIREBASE_URL = 'https://waffle-menu-cff76-default-rtdb.firebaseio.com/siparisler.json';

        const urlParams = new URLSearchParams(window.location.search);
        const masaParam = urlParams.get('masa');
        if(masaParam) {
            document.getElementById('masa-select').value = masaParam;
            document.getElementById('table-display').innerText = `Masa: ${masaParam}`;
            document.getElementById('masa-container').classList.add('hidden');
        }

        async function loadMenu() {
            try {
                const res = await fetch(APPS_SCRIPT_URL);
                const data = await res.json();
                
                renderWaffleMenu(data.waffle);
                renderDrinksMenu(data.drinks);

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('order-form').classList.remove('hidden');
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = "❌ Menü yüklenemedi. Lütfen internetinizi kontrol edin.";
            }
        }

        function renderWaffleMenu(rows) {
            const section = document.getElementById('waffle-section');
            let categories = {};
            
            rows.forEach((row, index) => {
                if(index === 0) return; // Tablonun başlık satırını atla
                const kat = row[0], ad = row[1], fiyat = row[2], durum = row[3];
                if(!kat || !ad || durum === 'Pasif' || durum === 'pasif') return;
                if(!categories[kat]) categories[kat] = [];
                categories[kat].push({ad, fiyat: parseFloat(fiyat) || 0});
            });

            for (let kat in categories) {
                let html = `<div class="bg-white p-4 rounded-2xl shadow-sm"><h2 class="text-lg font-bold text-gray-800 mb-3 border-b border-gray-100 pb-2">🥞 ${kat}</h2><div class="grid grid-cols-2 gap-3">`;
                categories[kat].forEach(prod => {
                    let priceText = prod.fiyat > 0 ? `(+${prod.fiyat} TL)` : 'Ücretsiz';
                    html += `
                        <label class="flex items-start p-3 rounded-xl border border-gray-100 hover:bg-rose-50/30 cursor-pointer transition select-none">
                            <input type="checkbox" name="waffle_items" value="${prod.ad}" data-price="${prod.fiyat}" class="accent-rose-500 mt-1 mr-3 rounded">
                            <div><span class="block text-sm font-semibold text-gray-700">${prod.ad}</span><span class="text-xs text-gray-400">${priceText}</span></div>
                        </label>`;
                });
                html += `</div></div>`; section.innerHTML += html;
            }
        }

        function renderDrinksMenu(rows) {
            const container = document.getElementById('drinks-container');
            container.innerHTML = '';
            rows.forEach((row, index) => {
                if(index === 0) return; // Başlık satırını atla
                const grup = row[0], ad = row[1], fiyat = row[2], durum = row[3];
                if(!grup || !ad || durum === 'Pasif' || durum === 'pasif') return;
                container.innerHTML += `
                    <div class="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
                        <div><span class="font-medium text-gray-700 text-sm">${ad}</span><span class="text-xs text-gray-400 block">${grup}</span></div>
                        <div class="flex items-center space-x-3"><span class="text-sm font-bold text-gray-600">${fiyat} TL</span><input type="number" name="drink_${ad}" data-price="${fiyat}" min="0" value="0" class="w-12 text-center border border-gray-200 rounded-lg p-1 text-sm focus:border-rose-400"></div>
                    </div>`;
            });
        }

        document.getElementById('order-form').addEventListener('input', () => {
            let total = 0;
            document.querySelectorAll('input[name="waffle_items"]:checked').forEach(el => total += parseFloat(el.dataset.price) || 0);
            document.querySelectorAll('input[type="number"]').forEach(el => total += (parseInt(el.value) || 0) * (parseFloat(el.dataset.price) || 0));
            document.getElementById('total-price').innerText = total;
        });

        document.getElementById('masa-select').addEventListener('change', (e) => {
            document.getElementById('table-display').innerText = e.target.value ? `Masa: ${e.target.value}` : 'Masa: Seçilmedi';
        });

        document.getElementById('order-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const masa = document.getElementById('masa-select').value;
            if(!masa) { alert("Lütfen masa numaranızı seçin!"); return; }
            let mzm = []; document.querySelectorAll('input[name="waffle_items"]:checked').forEach(el => mzm.push(el.value));
            let icc = []; document.querySelectorAll('input[type="number"]').forEach(el => {  let qty = parseInt(el.value) || 0; if(qty > 0) icc.push(`${qty} x ${el.name.replace('drink_', '')}`); });
            
            const siparis = { id: Date.now(), masa, malzemeler: mzm, icecekler: icc, not: document.getElementById('order-note').value, toplam: document.getElementById('total-price').innerText, zaman: new Date().toLocaleTimeString('tr-TR') };

            fetch(FIREBASE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(siparis) })
            .then(res => { if(res.ok) { alert(`Sipariş mutfağa ulaştı! 🥞`); document.getElementById('order-form').reset(); document.getElementById('total-price').innerText = '0'; } })
            .catch(() => alert('Bağlantı hatası!'));
        });

        window.onload = loadMenu;
    </script>
</body>
</html>
